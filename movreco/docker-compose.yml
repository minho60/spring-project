services:
  app:
    build: .
    container_name: movreco-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: jdbc:mysql://${TIDB_HOST}:4000/movreco?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=UTC&connectTimeout=10000
      DB_USERNAME: ${TIDB_USERNAME}
      DB_PASSWORD: ${TIDB_PASSWORD}
      SPRING_SQL_INIT_MODE: never
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
