<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Best Practices -->
    <title th:text="${title != null ? title : 'Movreco'}">Movreco - 당신의 최고의 추천</title>
    <meta name="description" content="다양한 장르의 프리미엄 영화와 도서 추천을 한 곳에서 만나보세요.">
    
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>

    <!-- Nav -->
    <nav th:replace="~{layout/header :: header}"></nav>

    <!-- Content -->
    <main class="container" id="main-content">
        <!-- Hero Section -->
        <section class="hero" id="hero-section">
            <h1>당신의 다음 인생작을 <br><span class="highlight">찾아보세요</span></h1>
            <p>당신의 기분에 맞춰 엄선된 영화와 도서가 기다리고 있습니다. 압도적인 디자인과 프리미엄 컬렉션으로 새로운 즐거움을 만나보세요.</p>
            
            <form th:action="@{/search}" method="get" class="search-container">
                <input type="text" name="keyword" class="search-input" placeholder="제목, 감독, 작가로 검색해 보세요..." required>
                <button type="submit" class="btn-search">탐색하기</button>
            </form>
        </section>

        <!-- Dummy Recommendations -->
        <h2 class="section-title">지금 뜨는 작품 <span>🔥</span></h2>
        
        <div class="grid-container" id="trending-grid">
            
            <!-- Dynamic Items Iteration -->
            <a th:href="@{/items/{id}(id=${item.id})}" class="card card-link-wrapper" th:each="item : ${items}">
                <div class="card-img-wrapper">
                    <!-- Image Source -->
                    <img th:src="${item.imageUrl}" th:alt="${item.title}" class="card-img">
                    <span class="card-badge" th:text="${item.type == 'MOVIE' ? '영화' : '도서'}" th:classappend="${item.type == 'BOOK' ? 'badge-book' : ''}">분류</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title mt-0" th:text="${item.title}">Item Title</h3>
                    <p class="card-desc" th:text="${item.description}">Item Description</p>
                    <div class="card-meta">
                        <span class="rating">★ [[${item.rating}]]</span>
                        <span th:text="${item.genre}">Genre</span>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{layout/footer :: footer}"></footer>

</body>
</html>
