<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 게시판 - Movreco</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/board.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container pt-4">
        <div class="board-header">
            <h2 class="section-title">커뮤니티 게시판</h2>
            <a href="/board/new" class="btn-new-post">✍️ 글쓰기</a>
        </div>
        
        <table class="board-table">
            <thead>
                <tr>
                    <th width="10%">번호</th>
                    <th width="50%">제목</th>
                    <th width="15%">작성자</th>
                    <th width="15%">작성일</th>
                    <th width="10%">조회수</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="post : ${posts}">
                    <td th:text="${post.id}">1</td>
                    <td>
                        <a th:href="@{/board/{id}(id=${post.id})}" th:text="${post.title}" class="board-link">Title</a>
                    </td>
                    <td th:text="${post.nickname}">Author</td>
                    <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">Date</td>
                    <td th:text="${post.viewCount}">0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(posts)}">
                    <td colspan="5" class="text-muted-center">아직 등록된 게시물이 없습니다. 첫 번째 글을 작성해 보세요!</td>
                </tr>
            </tbody>
        </table>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
