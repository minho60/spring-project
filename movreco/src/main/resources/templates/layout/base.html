<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO Best Practices -->
    <title th:text="${title != null ? title : 'Movreco'}">Movreco</title>
    <meta name="description" content="Discover premium movie and book recommendations tailored just for you.">
    
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>

    <!-- Header Navigation -->
    <nav th:replace="~{layout/header :: header}"></nav>

    <!-- Main Content Area -->
    <main class="container" id="main-content">
        <div layout:fragment="content" th:remove="tag">
            <!-- Child pages will render content here -->
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{layout/footer :: footer}"></footer>

</body>
</html>
