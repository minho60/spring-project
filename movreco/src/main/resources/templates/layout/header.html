<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav class="navbar" id="main-nav" th:fragment="header">
        <a href="/" class="brand-logo">movreco</a>
        <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기/닫기">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="mobile-menu" id="mobile-menu">
            <ul class="nav-links">
                <li><a href="/">둘러보기</a></li>
                <li><a href="/movies">영화</a></li>
                <li><a href="/books">도서</a></li>
                <li><a href="/board">게시판</a></li>
                <!-- 모바일 전용: 인증 메뉴를 일반 메뉴 항목으로 표시 -->
                <li sec:authorize="!isAuthenticated()" class="mobile-only"><a href="/login">로그인</a></li>
                <li sec:authorize="!isAuthenticated()" class="mobile-only"><a href="/signup">회원가입</a></li>
                <li sec:authorize="isAuthenticated()" class="mobile-only"><a href="/profile"><svg class="profile-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg> <span sec:authentication="name">user</span></a></li>
                <li sec:authorize="isAuthenticated()" class="mobile-only">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="nav-logout-btn">로그아웃</button>
                    </form>
                </li>
            </ul>
            <!-- 데스크톱 전용: 버튼 스타일 -->
            <div class="auth-buttons flex-gap-10 desktop-only">
                <a sec:authorize="!isAuthenticated()" href="/login" class="btn-login" id="nav-login-btn">로그인</a>
                <a sec:authorize="!isAuthenticated()" href="/signup" class="btn-login btn-outline-primary-header">회원가입</a>
                <div sec:authorize="isAuthenticated()" class="profile-dropdown" id="profile-dropdown">
                    <button class="profile-btn" id="profile-btn">
                        <span class="profile-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></span>
                        <span sec:authentication="name">user</span>
                    </button>
                    <div class="profile-menu" id="profile-menu">
                        <a href="/profile" class="profile-menu-item">프로필</a>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="profile-menu-item profile-menu-logout">로그아웃</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <script>
            (function() {
                var btn = document.getElementById('menu-toggle');
                var nav = document.getElementById('main-nav');
                if (btn && nav) {
                    btn.addEventListener('click', function() {
                        nav.classList.toggle('nav-open');
                        btn.classList.toggle('active');
                    });
                    window.addEventListener('resize', function() {
                        if (window.innerWidth > 768) {
                            nav.classList.remove('nav-open');
                            btn.classList.remove('active');
                        }
                    });
                }
                // Profile dropdown toggle
                var profileBtn = document.getElementById('profile-btn');
                var profileMenu = document.getElementById('profile-menu');
                if (profileBtn && profileMenu) {
                    profileBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        profileMenu.classList.toggle('show');
                    });
                    document.addEventListener('click', function() {
                        profileMenu.classList.remove('show');
                    });
                }
            })();
        </script>
    </nav>
</body>
</html>
