<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
    <nav class="navbar" id="main-nav" th:fragment="header">
        <a href="/" class="brand-logo">movreco</a>
        <button class="menu-toggle" id="menu-toggle" aria-label="메뉴 열기/닫기">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links">
            <li><a href="/">둘러보기</a></li>
            <li><a href="/movies">영화</a></li>
            <li><a href="/books">도서</a></li>
            <li><a href="/board">게시판</a></li>
        </ul>
        <div class="auth-buttons flex-gap-10">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-login" id="nav-login-btn">로그인</a>
            <a sec:authorize="!isAuthenticated()" href="/signup" class="btn-login btn-outline-primary-header">회원가입</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn-login btn-danger-header">로그아웃</button>
            </form>
        </div>
        <script>
            (function() {
                var btn = document.getElementById('menu-toggle');
                var nav = document.getElementById('main-nav');
                if (btn && nav) {
                    btn.addEventListener('click', function() {
                        nav.classList.toggle('nav-open');
                        btn.classList.toggle('active');
                    });
                    window.addEventListener('resize', function() {
                        if (window.innerWidth > 768) {
                            nav.classList.remove('nav-open');
                            btn.classList.remove('active');
                        }
                    });
                }
            })();
        </script>
    </nav>
</body>
</html>
