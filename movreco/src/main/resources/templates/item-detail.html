<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.title} + ' - Movreco'">상세 정보</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/item.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container pt-4">
        <div class="detail-container">
            <section class="item-info">
                <img th:src="${item.imageUrl}" alt="Item Image" class="item-img">
                <div class="item-text">
                    <span class="card-badge mb-1-inline" th:text="${item.type == 'MOVIE' ? '영화' : '도서'}">분류</span>
                    <div class="flex-center-gap-10 text-muted-mb">
                        <h2 th:text="${item.title}" class="m-0">작품 제목</h2>
                        <form sec:authorize="isAuthenticated()" th:action="@{/items/{id}/bookmark(id=${item.id})}" method="post" class="m-0">
                            <button type="submit" class="btn-icon" title="찜하기" th:styleappend="${isBookmarked ? 'color:#ef4444;' : 'color:#555;'}">
                                <span th:text="${isBookmarked ? '♥' : '♡'}"></span>
                            </button>
                        </form>
                    </div>
                    <p class="text-muted-mb"><strong>장르:</strong> <span th:text="${item.genre}"></span></p>
                    <p class="text-muted-mb"><strong>평점:</strong> <span class="text-yellow">★ <span th:text="${item.rating}"></span></span></p>
                    <p class="text-muted-mb" th:if="${item.director}"><strong><span th:text="${item.type == 'BOOK' ? '저자:' : '감독:'}">감독:</span></strong> <span th:text="${item.director}"></span></p>
                    <p class="text-muted-mb" th:if="${item.actors != null && item.actors != '-'}"><strong>출연:</strong> <span th:text="${item.actors}"></span></p>
                    
                    <h3 style="margin-top:2rem; margin-bottom:0.5rem; border-bottom:1px solid #333; padding-bottom:0.5rem; color:#fff; font-size:1.2rem;">작품 알아보기</h3>
                    <p th:text="${item.description}" style="line-height:1.8; color:#cbd5e1;">Description</p>
                </div>
            </section>

            <section class="reviews-section">
                <h3>리뷰 목록</h3>
                
                <div th:if="${#lists.isEmpty(reviews)}" class="text-muted-mt">
                    아직 등록된 리뷰가 없습니다. 첫 걸음을 남겨보세요!
                </div>
                
                <div class="review-card" th:each="review : ${reviews}">
                    <div class="review-rating text-yellow">★ <span th:text="${review.rating}"></span></div>
                    <div class="review-content" th:text="${review.content}">Review content</div>
                    <div class="review-footer">
                        <span class="text-primary-bold" th:text="${review.nickname}">User</span>
                        <span style="color:#666;">&bull;</span>
                        <span style="color:#888;" th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">Date</span>
                        <form sec:authorize="isAuthenticated()" th:if="${#authentication.name == review.username}" th:action="@{/items/{itemId}/reviews/{reviewId}/delete(itemId=${item.id}, reviewId=${review.id})}" method="post" class="m-0" style="display:inline;" onsubmit="return confirm('이 리뷰를 정말 삭제하시겠습니까?');">
                            <button type="submit" class="btn-outline-danger">삭제</button>
                        </form>
                    </div>
                </div>

                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/items/{id}/reviews(id=${item.id})}" method="post" class="review-form">
                        <h4>리뷰 작성하기</h4>
                        <div class="flex-gap-1rem">
                            <input type="number" name="rating" min="1" max="10" step="0.1" class="form-input w-150px" placeholder="별점 (1-10)" required>
                            <input type="text" name="content" class="form-input flex-grow-1" placeholder="작품에 대한 감상을 편하게 남겨주세요." required>
                        </div>
                        <button type="submit" class="btn-submit">리뷰 등록</button>
                    </form>
                </div>
                
                <div sec:authorize="!isAuthenticated()" class="auth-prompt-box">
                    리뷰를 작성하시려면 <a href="/login" class="text-primary">로그인</a>해 주세요.
                </div>
            </section>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
