<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${item.title} + ' - Movreco'">Item Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .detail-container { display: flex; flex-direction: column; gap: 2rem; }
        .item-info { display: flex; gap: 2rem; background: var(--card-bg, #1e1e1e); padding: 2rem; border-radius: 12px; }
        .item-img { width: 300px; border-radius: 8px; object-fit: cover; }
        .item-text h2 { margin-top: 0; color: #fff; font-size: 2rem; }
        .reviews-section { background: var(--card-bg, #1e1e1e); padding: 2rem; border-radius: 12px; }
        .review-card { padding: 1rem; border-bottom: 1px solid #333; }
        .review-card:last-child { border-bottom: none; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: #aaa; }
        .review-content { color: #ddd; }
        .review-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        .form-input { padding: 0.75rem; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: #fff; }
        .btn-submit { padding: 0.75rem 1.5rem; background-color: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; align-self: flex-start; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav">
        <a href="/" class="brand-logo">movreco</a>
        <ul class="nav-links">
            <li><a href="/">Discover</a></li>
            <li><a href="/movies">Movies</a></li>
            <li><a href="/books">Books</a></li>
            <li><a href="/board">Board</a></li>
        </ul>
        <div class="auth-buttons" style="display:flex; gap:10px;">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-login" id="nav-login-btn">Sign In</a>
            <a sec:authorize="!isAuthenticated()" href="/signup" class="btn-login" style="background-color: transparent; border: 1px solid #6366f1;">Sign Up</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-login" style="background-color: #ef4444;">Log Out</button>
            </form>
        </div>
    </nav>

    <main class="container" style="padding-top: 4rem;">
        <div class="detail-container">
            <section class="item-info">
                <img th:src="${item.imageUrl}" alt="Item Image" class="item-img">
                <div class="item-text">
                    <span class="card-badge" th:text="${item.type}" style="margin-bottom: 1rem; display: inline-block;">Type</span>
                    <h2 th:text="${item.title}">Title</h2>
                    <p style="color: #bbb; margin-bottom: 1rem;"><strong>Genre:</strong> <span th:text="${item.genre}"></span></p>
                    <p style="color: #bbb; margin-bottom: 1rem;"><strong>Rating:</strong> ★ <span th:text="${item.rating}"></span></p>
                    <p th:text="${item.description}">Description</p>
                </div>
            </section>

            <section class="reviews-section">
                <h3>Reviews</h3>
                
                <div th:if="${#lists.isEmpty(reviews)}" style="color: #888; margin-top: 1rem;">
                    No reviews yet. Be the first to add one!
                </div>
                
                <div class="review-card" th:each="review : ${reviews}">
                    <div class="review-header">
                        <span style="color: #6366f1; font-weight: bold;" th:text="${review.username}">User</span>
                        <span>
                            ★ <span th:text="${review.rating}"></span>
                            &bull; <span th:text="${#temporals.format(review.createdAt, 'yyyy-MM-dd HH:mm')}">Date</span>
                        </span>
                    </div>
                    <div class="review-content" th:text="${review.content}">Review content</div>
                </div>

                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/items/{id}/reviews(id=${item.id})}" method="post" class="review-form">
                        <h4>Write a Review</h4>
                        <div style="display:flex; gap: 1rem;">
                            <input type="number" name="rating" min="1" max="10" step="0.1" class="form-input" placeholder="Rating (1-10)" style="width:150px;" required>
                            <input type="text" name="content" class="form-input" placeholder="What did you think?" style="flex-grow:1;" required>
                        </div>
                        <button type="submit" class="btn-submit">Submit Review</button>
                    </form>
                </div>
                
                <div sec:authorize="!isAuthenticated()" style="margin-top:2rem; padding: 1rem; background: #2a2a2a; border-radius: 6px; text-align: center;">
                    Please <a href="/login" style="color: #6366f1;">Sign in</a> to leave a review.
                </div>
            </section>
        </div>
    </main>

</body>
</html>
