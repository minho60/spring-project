<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Movreco</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="auth-title">환영합니다</h2>
            
            <div th:if="${param.error}" class="error-msg">
                아이디 또는 비밀번호가 올바르지 않습니다.
            </div>
            <div th:if="${param.logout}" class="success-msg">
                성공적으로 로그아웃되었습니다.
            </div>
            <div th:if="${param.registered}" class="success-msg">
                회원가입이 완료되었습니다! 로그인해 주세요.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">아이디</label>
                    <input type="text" id="username" name="username" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                <button type="submit" class="btn-submit">로그인</button>
            </form>
            
            <div class="auth-footer">
                계정이 없으신가요? <a href="/signup">여기서 가입하세요</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
