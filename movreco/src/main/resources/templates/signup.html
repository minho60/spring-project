<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Movreco</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="auth-title">회원가입</h2>
            
            <div th:if="${error}" class="error-msg" th:text="${error}">
                에러 메시지
            </div>

            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">아이디</label>
                    <div class="flex-gap-10">
                        <input type="text" id="username" name="username" class="form-input flex-grow-1" required autofocus>
                        <button type="button" id="btn-check-username" class="btn-outline-primary nowrap">중복 확인</button>
                    </div>
                    <div id="username-msg" class="feedback-msg"></div>
                    <input type="hidden" id="is-username-valid" value="false">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="nickname" class="form-label">별명 (닉네임)</label>
                    <input type="text" id="nickname" name="nickname" class="form-input" placeholder="예: 무비매니아" required>
                </div>
                <div class="form-group">
                    <label for="favoriteGenre" class="form-label">가장 좋아하는 장르</label>
                    <select id="favoriteGenre" name="favoriteGenre" class="form-input form-select" required>
                        <option value="">-- 좋아하는 장르를 하나 선택해 주세요 --</option>
                        <option th:each="genre : ${genres}" th:value="${genre.value}" th:text="${genre.label}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" required minlength="4">
                </div>
                <button type="submit" class="btn-submit">가입하기</button>
            </form>
            
            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="/login">여기서 로그인하세요</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>

    <script th:src="@{/assets/js/signup.js}"></script>
</body>
</html>
