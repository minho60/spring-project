<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Movreco</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/auth.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="auth-title">회원가입</h2>
            
            <div th:if="${error}" class="error-msg" th:text="${error}">
                에러 메시지
            </div>

            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">아이디</label>
                    <div class="flex-gap-10">
                        <input type="text" id="username" name="username" class="form-input flex-grow-1" required autofocus>
                        <button type="button" id="btn-check-username" class="btn-outline-primary nowrap">중복 확인</button>
                    </div>
                    <div id="username-msg" class="feedback-msg"></div>
                    <input type="hidden" id="is-username-valid" value="false">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">이메일</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="nickname" class="form-label">별명 (닉네임)</label>
                    <input type="text" id="nickname" name="nickname" class="form-input" placeholder="예: 무비매니아" required>
                </div>
                <div class="form-group">
                    <label for="favoriteGenre" class="form-label">가장 좋아하는 장르</label>
                    <select id="favoriteGenre" name="favoriteGenre" class="form-input" style="appearance: auto; padding: 0.8rem 1.2rem; cursor:pointer;" required>
                        <option value="">-- 좋아하는 장르를 하나 선택해 주세요 --</option>
                        <option value="Action">🧨 액션 / 스릴러</option>
                        <option value="Sci-Fi">🚀 SF / 우주</option>
                        <option value="Romance">💖 로맨스 / 멜로</option>
                        <option value="Fantasy">🧙‍♂️ 판타지 / 마법</option>
                        <option value="Comedy">😂 코미디 / 예능</option>
                        <option value="Drama">🎭 드라마</option>
                        <option value="Animation">🎨 애니메이션</option>
                        <option value="Horror">👻 공포 / 호러</option>
                        <option value="Documentary">🎥 다큐멘터리</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" required minlength="4">
                </div>
                <button type="submit" class="btn-submit">가입하기</button>
            </form>
            
            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="/login">여기서 로그인하세요</a>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>

    <script>
        const btnCheck = document.getElementById('btn-check-username');
        const inputUsername = document.getElementById('username');
        const msgDiv = document.getElementById('username-msg');
        const validFlag = document.getElementById('is-username-valid');
        const form = document.querySelector('form');

        btnCheck.addEventListener('click', async () => {
            const username = inputUsername.value.trim();
            if(!username) {
                msgDiv.textContent = '아이디를 입력해주세요.';
                msgDiv.className = 'feedback-msg text-danger';
                return;
            }
            
            try {
                const response = await fetch(`/api/check-username?username=${encodeURIComponent(username)}`);
                const isTaken = await response.json();
                
                if (isTaken) {
                    msgDiv.textContent = '❌ 이미 사용 중인 아이디입니다.';
                    msgDiv.className = 'feedback-msg text-danger';
                    validFlag.value = 'false';
                } else {
                    msgDiv.textContent = '✅ 멋진 아이디네요! 사용 가능합니다.';
                    msgDiv.className = 'feedback-msg text-success';
                    validFlag.value = 'true';
                }
            } catch (err) {
                msgDiv.textContent = '서버 통신 오류가 발생했습니다.';
                msgDiv.className = 'feedback-msg text-danger';
            }
        });

        // 사용자가 다시 타자를 치면 중복확인 초기화
        inputUsername.addEventListener('input', () => {
            validFlag.value = 'false';
            msgDiv.textContent = '';
        });

        form.addEventListener('submit', (e) => {
            if (validFlag.value !== 'true') {
                e.preventDefault();
                alert('회원가입 전 반드시 아이디 중복 확인을 통과해야 합니다.');
                inputUsername.focus();
            }
        });
    </script>
</body>
</html>
