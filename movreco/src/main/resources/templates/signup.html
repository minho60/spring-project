<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Movreco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 5rem auto;
            padding: 2rem;
            background-color: var(--card-bg, #1e1e1e);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .auth-title { margin-bottom: 2rem; text-align: center; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: #aaa; }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .btn-submit:hover { background-color: #4f46e5; }
        .auth-footer { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; }
        .auth-footer a { color: #6366f1; text-decoration: none; }
        .error-msg { color: #ef4444; margin-bottom: 1rem; text-align: center; background: #fee2e2; padding: 0.5rem; border-radius: 4px; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav">
        <a href="/" class="brand-logo">movreco</a>
        <ul class="nav-links">
            <li><a href="/">Discover</a></li>
            <li><a href="/movies">Movies</a></li>
            <li><a href="/books">Books</a></li>
        </ul>
        <a href="/login" class="btn-login" id="nav-login-btn">Sign In</a>
    </nav>

    <main class="container">
        <div class="auth-container">
            <h2 class="auth-title">Create Account</h2>
            
            <div th:if="${error}" class="error-msg" th:text="${error}">
                Error message here.
            </div>

            <form th:action="@{/signup}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required minlength="4">
                </div>
                <button type="submit" class="btn-submit">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in here</a>
            </div>
        </div>
    </main>

</body>
</html>
