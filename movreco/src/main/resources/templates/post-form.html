<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Post - Movreco</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .form-container { background: var(--card-bg, #1e1e1e); padding: 3rem; border-radius: 12px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; color: #aaa; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #333; border-radius: 6px; background-color: #2a2a2a; color: #fff; }
        textarea.form-input { min-height: 200px; resize: vertical; }
        .btn-submit { padding: 0.75rem 2rem; background-color: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav">
        <a href="/" class="brand-logo">movreco</a>
        <ul class="nav-links">
            <li><a href="/">Discover</a></li>
            <li><a href="/movies">Movies</a></li>
            <li><a href="/books">Books</a></li>
            <li><a href="/board">Board</a></li>
        </ul>
        <div class="auth-buttons" style="display:flex; gap:10px;">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-login" id="nav-login-btn">Sign In</a>
            <a sec:authorize="!isAuthenticated()" href="/signup" class="btn-login" style="background-color: transparent; border: 1px solid #6366f1;">Sign Up</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-login" style="background-color: #ef4444;">Log Out</button>
            </form>
        </div>
    </nav>

    <main class="container" style="padding-top: 4rem;">
        <div class="form-container">
            <h2 style="margin-top:0; color:#fff;">Write a Recommendation</h2>
            <form th:action="@{/board}" method="post">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Content</label>
                    <textarea name="content" class="form-input" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Publish Post</button>
                <a href="/board" style="color:#aaa; text-decoration:none; margin-left: 1rem;">Cancel</a>
            </form>
        </div>
    </main>

</body>
</html>
