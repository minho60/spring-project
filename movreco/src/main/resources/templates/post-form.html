<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - Movreco</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/post.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container pt-4">
        <div class="form-container">
            <h2 class="form-title mt-0 text-white">새 추천글 작성하기</h2>
            <form th:action="@{/board}" method="post">
                <div class="form-group">
                    <label class="form-label">제목</label>
                    <input type="text" name="title" class="form-input" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">내용</label>
                    <textarea name="content" class="form-input" required></textarea>
                </div>
                <button type="submit" class="btn-submit">글 등록하기</button>
                <a href="/board" class="btn-cancel">취소</a>
            </form>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
