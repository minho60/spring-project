<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - Movreco'">게시글 상세</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="stylesheet" th:href="@{/assets/css/post.css}">
</head>
<body>

    <nav th:replace="~{layout/header :: header}"></nav>

    <main class="container pt-4">
        <div class="post-container">
            <div class="post-header">
                <h1 class="post-title" th:text="${post.title}">Post Title</h1>
                <div class="flex-between gap-10">
                    <div class="post-meta m-0">
                        <span class="text-primary-bold">👤 [[${post.nickname}]]</span>
                        <span>🕒 [[${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}]]</span>
                        <span>👁️ [[${post.viewCount}]]</span>
                    </div>
                    <div sec:authorize="isAuthenticated()" th:if="${#authentication.name == post.username}" class="flex-gap-10">
                        <a th:href="@{/board/{id}/edit(id=${post.id})}" class="btn-outline-primary">수정</a>
                        <form th:action="@{/board/{id}/delete(id=${post.id})}" method="post" class="m-0" onsubmit="return confirm('정말로 이 게시글을 삭제하시겠습니까?');">
                            <button type="submit" class="btn-danger-sm">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="post-content" th:text="${post.content}">
                Content goes here...
            </div>
            <a href="/board" class="btn-back">← 목록으로 돌아가기</a>
        </div>
    </main>

    <footer th:replace="~{layout/footer :: footer}"></footer>
</body>
</html>
