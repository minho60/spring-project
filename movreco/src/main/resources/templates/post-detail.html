<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${post.title} + ' - Movreco'">Post Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .post-container { background: var(--card-bg, #1e1e1e); padding: 3rem; border-radius: 12px; }
        .post-header { margin-bottom: 2rem; border-bottom: 1px solid #333; padding-bottom: 1rem; }
        .post-title { font-size: 2.5rem; margin-top: 0; color: #fff; }
        .post-meta { color: #aaa; display: flex; gap: 1rem; }
        .post-content { line-height: 1.8; color: #ddd; font-size: 1.1rem; white-space: pre-wrap; }
        .btn-back { display: inline-block; margin-top: 2rem; color: #6366f1; text-decoration: none; }
    </style>
</head>
<body>

    <nav class="navbar" id="main-nav">
        <a href="/" class="brand-logo">movreco</a>
        <ul class="nav-links">
            <li><a href="/">Discover</a></li>
            <li><a href="/movies">Movies</a></li>
            <li><a href="/books">Books</a></li>
            <li><a href="/board">Board</a></li>
        </ul>
        <div class="auth-buttons" style="display:flex; gap:10px;">
            <a sec:authorize="!isAuthenticated()" href="/login" class="btn-login" id="nav-login-btn">Sign In</a>
            <a sec:authorize="!isAuthenticated()" href="/signup" class="btn-login" style="background-color: transparent; border: 1px solid #6366f1;">Sign Up</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="btn-login" style="background-color: #ef4444;">Log Out</button>
            </form>
        </div>
    </nav>

    <main class="container" style="padding-top: 4rem;">
        <div class="post-container">
            <div class="post-header">
                <h1 class="post-title" th:text="${post.title}">Post Title</h1>
                <div class="post-meta">
                    <span style="color:#6366f1; font-weight:bold;">👤 [[${post.username}]]</span>
                    <span>🕒 [[${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}]]</span>
                    <span>👁️ [[${post.viewCount}]]</span>
                </div>
            </div>
            <div class="post-content" th:text="${post.content}">
                Content goes here...
            </div>
            <a href="/board" class="btn-back">← Back to Board</a>
        </div>
    </main>

</body>
</html>
