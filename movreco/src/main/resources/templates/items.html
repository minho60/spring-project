<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title : 'Movreco'}">전체 목록</title>
    
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
</head>
<body>

    <!-- Nav -->
    <nav th:replace="~{layout/header :: header}"></nav>

    <!-- Content -->
    <main class="container pt-4" id="main-content">
        <h2 class="section-title" th:text="${pageTitle}">전체 목록 보기</h2>
        
        <div class="grid-container" id="items-grid">
            <a th:href="@{/items/{id}(id=${item.id})}" class="card card-link-wrapper" th:each="item : ${items}">
                <div class="card-img-wrapper">
                    <!-- Image Source -->
                    <img th:src="${item.imageUrl}" th:alt="${item.title}" class="card-img">
                    <span class="card-badge" th:text="${item.type == 'MOVIE' ? '영화' : '도서'}" th:classappend="${item.type == 'BOOK' ? 'badge-book' : ''}">분류</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title mt-0" th:text="${item.title}">Item Title</h3>
                    <p class="card-desc" th:text="${item.description}">Item Description</p>
                    <div class="card-meta">
                        <span class="rating">★ [[${item.rating}]]</span>
                        <span th:text="${item.genre}">Genre</span>
                    </div>
                </div>
            </a>
        </div>
        
        <div th:if="${#lists.isEmpty(items)}" class="empty-state-card">
            <p>이 섹션에는 아직 항목이 존재하지 않습니다. 잠시 후 다시 시도해 보세요!</p>
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{layout/footer :: footer}"></footer>

</body>
</html>
