spring.application.name=movreco
spring.profiles.active=local

# --- MySQL Database Configuration ---
# 환경변수가 없으면 기본값(: 뒤의 값)을 사용합니다.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/movreco?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Initialize database schema from schema.sql
spring.sql.init.mode=always

# Enable Thymeleaf dev mode
spring.thymeleaf.cache=false
