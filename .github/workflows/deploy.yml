name: Deploy movreco to AWS EC2

on:
  push:
    branches: [ "main" ]  # 현재 브랜치가 'main'이면 main으로 수정하세요!


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Docker Hub 로그인 (Secrets에 DOCKERHUB_USERNAME, DOCKERHUB_TOKEN 등록 필수!)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. 이미지 빌드 및 푸시 (Context 경로를 movreco로 설정)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./movreco
          file: ./movreco/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/movreco:latest

      # 3. SSH 접속하여 EC2에 배포
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}  # Secrets에 저장한 이름 확인!
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 기존 컨테이너 중지 및 삭제
            docker stop movreco || true
            docker rm movreco || true
            docker image rm ${{ secrets.DOCKERHUB_USERNAME }}/movreco:latest || true
            
            # 새 이미지 Pull 및 실행 (80포트로 접속하면 내부 8080으로 연결)
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/movreco:latest
            docker run -d --name movreco -p 80:8080 \
              -e "SPRING_PROFILES_ACTIVE=prod" \
              -e "SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}" \
              -e "SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}" \
              -e "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/movreco:latest


            
            # 불필요한 이미지 정리
            docker image prune -f
